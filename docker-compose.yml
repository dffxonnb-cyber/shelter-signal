services:
  postgres:
    image: postgres:16-alpine
    container_name: shelter_signal_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shelter_signal}
      POSTGRES_USER: ${POSTGRES_USER:-shelter_signal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shelter_signal}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - shelter_signal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: shelter_signal_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  shelter_signal_pgdata:
